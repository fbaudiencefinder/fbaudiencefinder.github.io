<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>FB Audience Finder</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body {
font-family: Arial;
margin:0;
background:#f4f6fb;
}

.header {
background:#1877f2;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.logo {
font-size:28px;
font-weight:bold;
}

.ad-space {
width:100%;
height:90px;
background:#e0e0e0;
text-align:center;
line-height:90px;
}

.container {

max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
text-align:center;

}

input, select, button {

width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;

}

button {

background:#1877f2;
color:white;
border:none;
cursor:pointer;

}

button:hover {

background:#0d5ed7;

}

.links a {

display:block;
background:#42a5f5;
color:white;
padding:12px;
margin:10px;
border-radius:8px;
text-decoration:none;

}

.footer {

text-align:center;
padding:20px;

}

.footer a {

margin:0 10px;
color:#1877f2;
text-decoration:none;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
FB Audience Finder
</div>

</div>

<div class="ad-space">
Ad Space (Future Ads)
</div>

<div class="container">

<h2>Find Targeted Facebook Groups</h2>

<input
type="text"
id="country"
placeholder="Enter Country (Example: USA)">

<input
type="text"
id="category"
placeholder="Enter Category (Example: Cats)">

<button onclick="generateLinks()">
Find Audience
</button>

<div id="results" class="links"></div>

</div>

<div class="footer">

<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>

<p>© 2026 FB Audience Finder</p>

</div>

<script>

function generateLinks() {

let country =
document.getElementById("country").value;

let category =
document.getElementById("category").value;

if(country=="" || category=="") {

alert("Enter Country and Category");

return;

}

let keyword1 =
category + " " + country + " groups";

let keyword2 =
category + " lovers " + country;

let keyword3 =
category + " community " + country;

let groupSearch =
"https://www.facebook.com/search/groups?q="
+ keyword1;

let pageSearch =
"https://www.facebook.com/search/pages?q="
+ keyword2;

let extraSearch =
"https://www.facebook.com/search/groups?q="
+ keyword3;

document.getElementById("results").innerHTML =
`

<a href="${groupSearch}" target="_blank">
Search Groups (Targeted)
</a>

<a href="${pageSearch}" target="_blank">
Search Pages
</a>

<a href="${extraSearch}" target="_blank">
More Related Groups
</a>

`;

}

</script>

</body>

</html>
