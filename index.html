<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FB Audience Finder – Find Facebook Groups & Pages Fast</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
font-family: Arial, sans-serif;
margin:0;
background:#f5f7fb;
}

.header {
background:#1877f2;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.ad-space {
width:100%;
height:90px;
background:#e0e0e0;
text-align:center;
line-height:90px;
font-size:14px;
color:#555;
}

.container {
max-width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h2 {
color:#1877f2;
}

select, button {
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button {
background:#1877f2;
color:white;
border:none;
cursor:pointer;
}

button:hover {
background:#0d5ed7;
}

.links a {
display:block;
margin:10px;
padding:12px;
background:#42a5f5;
color:white;
text-decoration:none;
border-radius:8px;
}

.footer {
text-align:center;
padding:20px;
font-size:14px;
color:#555;
}

.footer a {
margin:0 10px;
text-decoration:none;
color:#1877f2;
}

</style>

</head>

<body>

<div class="header">
FB Audience Finder
</div>

<div class="ad-space">
Ad Space (Google AdSense Later)
</div>

<div class="container">

<h2>Find Facebook Audience Fast</h2>

<select id="country">

<option value="">Select Country</option>

<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
<option>India</option>
<option>Pakistan</option>
<option>UAE</option>

</select>

<select id="category">

<option value="">Select Category</option>

<option>Islamic</option>
<option>Motivation</option>
<option>Funny</option>
<option>Business</option>
<option>Quotes</option>
<option>Cats</option>
<option>Dogs</option>

</select>

<button onclick="generateLinks()">
Find Audience
</button>

<div class="links" id="results"></div>

</div>

<div class="footer">

<a href="#">About</a>
<a href="#">Privacy Policy</a>
<a href="#">Contact</a>

<p>© 2026 FB Audience Finder</p>

</div>

<script>

function generateLinks() {

let country =
document.getElementById("country").value;

let category =
document.getElementById("category").value;

if(country=="" || category=="") {
alert("Please select Country and Category");
return;
}

let groupSearch =
"https://www.facebook.com/search/groups?q="
+ category + "%20" + country;

let pageSearch =
"https://www.facebook.com/search/pages?q="
+ category + "%20" + country;

document.getElementById("results").innerHTML =
`
<a href="${groupSearch}" target="_blank">
Search Facebook Groups
</a>

<a href="${pageSearch}" target="_blank">
Search Facebook Pages
</a>
`;

}

</script>

</body>
</html>
