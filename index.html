<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
FB Audience Finder - Multi Search Tool
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body {
font-family: Arial;
margin:0;
background:#f4f6fb;
}

.header {

background:#1877f2;
color:white;
padding:20px;
text-align:center;

}

.logo {

font-size:28px;
font-weight:bold;

}

.tagline {

font-size:14px;
margin-top:5px;

}

.ad-space {

height:90px;
background:#e0e0e0;
text-align:center;
line-height:90px;

}

.container {

max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;

}

input, button {

width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;

}

button {

background:#1877f2;
color:white;
border:none;
cursor:pointer;

}

button:hover {

background:#0d5ed7;

}

.links a {

display:block;
background:#42a5f5;
color:white;
padding:12px;
margin:10px;
border-radius:8px;
text-decoration:none;

}

.keyword-box {

background:#f0f0f0;
padding:10px;
margin-top:20px;
border-radius:8px;

}

.footer {

text-align:center;
padding:20px;

}

.footer a {

margin:0 10px;
color:#1877f2;
text-decoration:none;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
FB Audience Finder
</div>

<div class="tagline">
Find Targeted Facebook Groups & Pages Fast
</div>

</div>

<div class="ad-space">
Ad Space (Google Ads Later)
</div>

<div class="container">

<h2>
Multi Facebook Search Tool
</h2>

<input
type="text"
id="country"
placeholder="Enter Country (Example: USA)">

<input
type="text"
id="category"
placeholder="Enter Category (Example: Cats)">

<button onclick="generateLinks()">

Multi Search Groups & Pages

</button>

<button onclick="generateKeywords()">

Generate Keywords

</button>

<div id="results"
class="links">

</div>

<div id="keywords"
class="keyword-box">

</div>

</div>

<div class="footer">

<a href="about.html">About</a>

<a href="privacy.html">Privacy</a>

<a href="contact.html">Contact</a>

<a href="terms.html">Terms</a>

<p>
© 2026 FB Audience Finder
</p>

</div>

<script>

function generateLinks() {

let country =
document.getElementById("country").value;

let category =
document.getElementById("category").value;

if(country=="" || category=="") {

alert("Enter Country and Category");

return;

}

let keywords = [

category + " groups in " + country,

category + " lovers " + country,

category + " community " + country,

category + " local groups " + country,

category + " buy sell " + country

];

let output="";

keywords.forEach(function(k){

let link =
"https://www.facebook.com/search/groups?q=" + k;

output +=

`<a href="${link}" target="_blank">
Search: ${k}
</a>`;

});

document.getElementById("results").innerHTML =
output;

}

function generateKeywords() {

let country =
document.getElementById("country").value;

let category =
document.getElementById("category").value;

let suggestions = [

category + " groups " + country,

category + " lovers " + country,

category + " community " + country,

category + " fans " + country,

category + " discussion " + country

];

let text="";

suggestions.forEach(function(k){

text += k + "<br>";

});

document.getElementById("keywords").innerHTML =
text;

}

</script>

</body>

</html>
